<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quét CCCD Sinh Viên GDQP</title>
  <!-- Thư viện giao diện Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Thư viện Quét QR Code -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* Ép khung hiển thị Camera/Ảnh không bao giờ bị tràn làm xô lệch giao diện */
    #reader {
      position: relative;
      width: 100% !important;
      max-height: 320px !important;
      background-color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 0.75rem;
    }
    #reader video, #reader img, #reader canvas {
      max-height: 320px !important;
      width: auto !important;
      object-fit: contain !important;
      margin: 0 auto !important;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 font-sans">

  <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    
    <!-- Tiêu đề trang web -->
    <div class="bg-indigo-600 p-6 text-white text-center">
      <h1 class="text-2xl font-bold uppercase tracking-wide">THÔNG TIN SV GDQP (LỚP 5 - LỚP 15)</h1>
      <p class="text-indigo-200 text-sm mt-1">Quét mã QR bằng Camera hoặc Tải ảnh từ Thư viện</p>
    </div>

    <div class="p-6 space-y-6">
      
      <!-- KHU VỰC CÔNG CỤ QUÉT QR CODE -->
      <div class="flex flex-col items-center border-2 border-dashed border-gray-300 rounded-xl p-4 bg-slate-50 space-y-4">
        
        <!-- Khung quét QR -->
        <div id="reader" class="w-full">
          <p id="reader-placeholder" class="text-gray-400 text-sm text-center p-6">
            Chưa mở Camera hoặc Tải ảnh
          </p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-3 w-full">
          <!-- 1. Nút mở Camera quét trực tiếp -->
          <button id="btn-toggle-scan" onclick="toggleScanner()" type="button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-5 rounded-lg transition duration-200 flex items-center justify-center gap-2 text-sm shadow">
            📷 Mở Camera Quét QR
          </button>

          <!-- 2. Nút tải ảnh QR có sẵn trong máy/thư viện -->
          <label class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-5 rounded-lg transition duration-200 flex items-center justify-center gap-2 cursor-pointer text-sm shadow">
            🖼️ Tải ảnh QR từ Thư viện
            <input type="file" id="qr-input-file" accept="image/*" class="hidden" onchange="scanQRFromFile(event)">
          </label>
        </div>
      </div>

      <!-- FORM NHẬP DỮ LIỆU SINH VIÊN -->
      <form id="studentForm" onsubmit="handleFormSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="md:col-span-2">
          <label class="block text-sm font-bold text-indigo-700 mb-1">Chọn Lớp Học (Lưu vào đúng Sheet) <span class="text-red-500">*</span></label>
          <select id="lop_hoc" required class="w-full border-2 border-indigo-300 rounded-lg p-2.5 text-sm font-semibold bg-indigo-50 text-indigo-900 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="DATA_LOP5">LỚP 5 (DATA_LOP5)</option>
            <option value="DATA_LOP6">LỚP 6 (DATA_LOP6)</option>
            <option value="DATA_LOP7">LỚP 7 (DATA_LOP7)</option>
            <option value="DATA_LOP8">LỚP 8 (DATA_LOP8)</option>
            <option value="DATA_LOP9">LỚP 9 (DATA_LOP9)</option>
            <option value="DATA_LOP10">LỚP 10 (DATA_LOP10)</option>
            <option value="DATA_LOP11">LỚP 11 (DATA_LOP11)</option>
            <option value="DATA_LOP12">LỚP 12 (DATA_LOP12)</option>
            <option value="DATA_LOP13">LỚP 13 (DATA_LOP13)</option>
            <option value="DATA_LOP14">LỚP 14 (DATA_LOP14)</option>
            <option value="DATA_LOP15">LỚP 15 (DATA_LOP15)</option>
            <option value="DATA_LOPHOCSAU">ĐĂNG KÝ HỌC SAU (DATA_LOPHOCSAU)</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Mã QR Gốc (qr_code)</label>
          <input type="text" id="qr_code" readonly class="w-full bg-gray-100 border border-gray-300 rounded-lg p-2.5 text-sm text-gray-600 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Số CCCD <span class="text-red-500">*</span></label>
          <input type="text" id="cccd" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Số CMND cũ</label>
          <input type="text" id="cmnd" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
          <input type="text" id="ho_va_ten" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ngày sinh (DD/MM/YYYY)</label>
          <input type="text" id="ngay_sinh" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Giới tính</label>
          <input type="text" id="gioi_tinh" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ thường trú</label>
          <input type="text" id="dia_chi" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ngày cấp (DD/MM/YYYY)</label>
          <input type="text" id="ngay_cap" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại <span class="text-red-500">*</span></label>
          <input type="tel" id="SDT" placeholder="Nhập SĐT sinh viên..." required pattern="[0-9]{10,11}" title="Vui lòng nhập số điện thoại hợp lệ (10-11 số)" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>

        <!-- Nút Submit Form -->
        <div class="md:col-span-2 pt-4">
          <button type="submit" id="btn-submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200">
            LƯU THÔNG TIN SINH VIÊN
          </button>
        </div>

      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzT60h7yVWHZXPWbqBPDky_LWPeovM9TtuNr8UW43nuGqryPEa3uZCUx5ehNNsqgrmr/exec";

    let html5QrcodeScanner = null;
    let isScanning = false;

    function formatDate(rawDate) {
      if (!rawDate || rawDate.length !== 8) return rawDate;
      return `${rawDate.substring(0, 2)}/${rawDate.substring(2, 4)}/${rawDate.substring(4, 8)}`;
    }

    // Tối ưu hóa việc khởi tạo bộ quét tập trung 100% vào định dạng QR
    function getScannerInstance() {
      return new Html5Qrcode("reader", {
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
        verbose: false
      });
    }

    // 1. Quét mã QR trực tiếp qua Camera (Đã sửa lỗi không nhận diện)
    async function toggleScanner() {
      const btn = document.getElementById('btn-toggle-scan');
      
      if (isScanning && html5QrcodeScanner) {
        await html5QrcodeScanner.stop();
        html5QrcodeScanner.clear();
        isScanning = false;
        btn.innerHTML = '📷 Mở Camera Quét QR';
        btn.classList.replace('bg-red-600', 'bg-indigo-600');
        document.getElementById('reader').innerHTML = '<p id="reader-placeholder" class="text-gray-400 text-sm text-center p-6">Chưa mở Camera hoặc Tải ảnh</p>';
      } else {
        html5QrcodeScanner = getScannerInstance();

        // Cấu hình Camera chuẩn tương thích mọi thiết bị
        const config = {
          fps: 15,
          qrbox: (viewfinderWidth, viewfinderHeight) => {
            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
            return { width: Math.floor(minEdge * 0.75), height: Math.floor(minEdge * 0.75) };
          }
        };

        try {
          // Dùng 'environment' linh hoạt thay vì ép buộc 'exact'
          await html5QrcodeScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess
          );
          isScanning = true;
          btn.innerHTML = '🛑 Tắt Camera';
          btn.classList.replace('bg-indigo-600', 'bg-red-600');
        } catch (err) {
          console.error(err);
          alert('Không thể truy cập Camera. Vui lòng cấp quyền truy cập Camera cho trình duyệt hoặc thử nút "🖼️ Tải ảnh QR từ Thư viện"!');
        }
      }
    }

    // 2. Tải ảnh từ thư viện (Đã khắc phục lỗi không đọc được QR & giữ đẹp UI)
    async function scanQRFromFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      // Tắt camera nếu đang mở
      if (isScanning && html5QrcodeScanner) {
        await toggleScanner();
      }

      const fileScanner = getScannerInstance();

      try {
        // Dùng scanFileV2 cho khả năng xử lý ảnh tĩnh vượt trội
        const result = await fileScanner.scanFileV2(file, true);
        if (result && result.decodedText) {
          onScanSuccess(result.decodedText);
        } else {
          throw new Error("Không giải mã được");
        }
      } catch (err) {
        console.warn("Lần quét 1 thất bại, đang thử tối ưu độ phân giải ảnh...", err);
        
        // Kế hoạch dự phòng: Xử lý lại ảnh qua Canvas (Tăng tương phản & thu nhỏ vùng thừa)
        try {
          const processedFile = await processImageForQR(file);
          const retryResult = await fileScanner.scanFileV2(processedFile, true);
          onScanSuccess(retryResult.decodedText);
        } catch (retryErr) {
          alert('⚠️ Không tìm thấy hoặc mã QR trên CCCD bị mờ/chói sáng. Hãy thử chụp cận cảnh vuông góc riêng góc mã QR trên thẻ!');
        }
      } finally {
        // Clear bộ nhớ file input để chọn lại được ảnh cùng tên nếu muốn
        e.target.value = '';
      }
    }

    // Hàm xử lý ảnh dự phòng bằng Canvas giúp làm rõ mã QR CCCD
    function processImageForQR(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Đưa kích thước ảnh về chuẩn tối ưu đọc mã QR (~1000px)
            const maxDim = 1000;
            let width = img.width;
            let height = img.height;
            if (width > maxDim || height > maxDim) {
              if (width > height) {
                height = Math.round((height * maxDim) / width);
                width = maxDim;
              } else {
                width = Math.round((width * maxDim) / height);
                height = maxDim;
              }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob((blob) => {
              if (blob) resolve(new File([blob], "processed.jpg", { type: "image/jpeg" }));
              else reject();
            }, 'image/jpeg', 0.9);
          };
          img.onerror = reject;
          img.src = event.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 3. Giải mã chuỗi QR CCCD và điền tự động vào ô input
    function onScanSuccess(decodedText) {
      document.getElementById('qr_code').value = decodedText;
      const parts = decodedText.split('|');

      if (parts.length >= 6) {
        document.getElementById('cccd').value = parts[0] || '';
        document.getElementById('cmnd').value = parts[1] || '';
        document.getElementById('ho_va_ten').value = parts[2] || '';
        document.getElementById('ngay_sinh').value = formatDate(parts[3] || '');
        document.getElementById('gioi_tinh').value = parts[4] || '';
        document.getElementById('dia_chi').value = parts[5] || '';
        document.getElementById('ngay_cap').value = formatDate(parts[6] || '');
        
        if (isScanning) toggleScanner();
        alert('✅ Giải mã CCCD thành công!');
      } else {
        alert('⚠️ Đã đọc được QR nhưng không đúng định dạng thẻ CCCD!');
      }
    }

    // 4. Gửi dữ liệu lưu vào đúng Sheet Lớp trên Google Sheets
    async function handleFormSubmit(e) {
      e.preventDefault();

      const btnSubmit = document.getElementById('btn-submit');
      btnSubmit.disabled = true;
      btnSubmit.innerText = 'Đang kiểm tra và lưu...';

      const formData = {
        lop_hoc: document.getElementById('lop_hoc').value,
        qr_code: document.getElementById('qr_code').value,
        cccd: document.getElementById('cccd').value,
        cmnd: document.getElementById('cmnd').value,
        ho_va_ten: document.getElementById('ho_va_ten').value,
        ngay_sinh: document.getElementById('ngay_sinh').value,
        gioi_tinh: document.getElementById('gioi_tinh').value,
        dia_chi: document.getElementById('dia_chi').value,
        ngay_cap: document.getElementById('ngay_cap').value,
        SDT: document.getElementById('SDT').value
      };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.result === 'success') {
          alert('✅ ' + result.message);
          const selectedClass = document.getElementById('lop_hoc').value;
          document.getElementById('studentForm').reset();
          document.getElementById('lop_hoc').value = selectedClass;
        } else {
          alert('⚠️ CẢNH BÁO: ' + result.message);
        }
      } catch (err) {
        alert('❌ Có lỗi kết nối đến Google Sheets!');
        console.error(err);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'LƯU THÔNG TIN SINH VIÊN';
      }
    }
  </script>
</body>
</html>
